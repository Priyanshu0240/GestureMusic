<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GestureMusic</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mediapipe/0.10.3/holistic.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;
    --accent:#7c3aed;--accent2:#a855f7;--glow:#7c3aed88;
    --text:#e2e8f0;--muted:#64748b;--white:#fff;
  }
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid #ffffff0f;background:var(--surface)}
  .logo{font-size:1.1rem;font-weight:700;letter-spacing:.05em;background:linear-gradient(135deg,var(--accent2),#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .instruments{display:flex;gap:8px}
  .inst-btn{background:transparent;border:1px solid #ffffff15;color:var(--muted);padding:6px 14px;border-radius:20px;cursor:pointer;font-size:.8rem;transition:all .2s}
  .inst-btn:hover{border-color:var(--accent);color:var(--accent2)}
  .inst-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 12px var(--glow)}
  .status{font-size:.75rem;color:var(--muted);display:flex;align-items:center;gap:6px}
  .dot{width:7px;height:7px;border-radius:50%;background:#ef4444}
  .dot.on{background:#22c55e;box-shadow:0 0 8px #22c55e88}
  main{flex:1;display:flex;gap:0;overflow:hidden;position:relative}
  #cam-wrap{position:relative;width:480px;min-width:340px;background:#000;border-right:1px solid #ffffff08}
  #webcam{width:100%;height:100%;object-fit:cover;transform:scaleX(-1);display:block;opacity:.85}
  #overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;transform:scaleX(-1)}
  .instrument-panel{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;gap:16px;position:relative}
  /* PIANO */
  #piano-wrap{position:relative;width:100%;max-width:700px}
  .piano-keys{display:flex;position:relative;height:160px;border-radius:8px;overflow:visible;box-shadow:0 0 30px #00000060}
  .wkey{flex:1;background:linear-gradient(180deg,#1e1e2e,#2d2d3f);border:1px solid #ffffff18;border-radius:0 0 6px 6px;cursor:pointer;position:relative;transition:background .1s;min-width:28px}
  .wkey.active,.wkey:hover{background:linear-gradient(180deg,var(--accent),var(--accent2));box-shadow:0 0 16px var(--glow)}
  .bkey{position:absolute;top:0;width:56%;height:58%;background:linear-gradient(180deg,#0d0d14,#1a1a26);border:1px solid #ffffff22;border-radius:0 0 5px 5px;z-index:2;cursor:pointer;transition:background .1s}
  .bkey.active,.bkey:hover{background:linear-gradient(180deg,var(--accent),#5b21b6);box-shadow:0 0 12px var(--glow)}
  .piano-label{text-align:center;margin-top:10px;font-size:.7rem;color:var(--muted)}
  /* GUITAR */
  #guitar-wrap{width:100%;max-width:680px}
  .guitar-neck{position:relative;height:160px;background:linear-gradient(180deg,#1a1208,#2a1e0c);border:1px solid #ffffff18;border-radius:10px;overflow:hidden}
  .string-line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,#ffffff22,#c4a35a88,#ffffff22);transform:translateX(0)}
  .fret-line{position:absolute;top:0;bottom:0;width:1px;background:#ffffff18}
  .chord-zones{position:absolute;top:0;bottom:0;display:flex;width:100%}
  .chord-z{flex:1;display:flex;align-items:center;justify-content:center;font-size:.7rem;color:#ffffff33;border-right:1px solid #ffffff08;transition:background .15s;cursor:pointer}
  .chord-z.active{background:#7c3aed44;color:var(--accent2)}
  .strum-zone{position:absolute;right:0;top:0;bottom:0;width:80px;background:#7c3aed18;border-left:2px solid var(--accent);display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--muted)}
  .strum-zone.active{background:#7c3aed55;box-shadow:inset 0 0 20px var(--glow)}
  /* DRUMS */
  #drums-wrap{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:10px;width:100%;max-width:600px}
  .pad{background:var(--surface2);border:1px solid #ffffff12;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:.75rem;color:var(--muted);cursor:pointer;transition:all .15s;height:100px}
  .pad-icon{font-size:1.6rem}
  .pad.active{border-color:var(--accent2);background:#7c3aed22;color:var(--accent2);box-shadow:0 0 18px var(--glow);transform:scale(0.97)}
  /* HARMONICA */
  #harmonica-wrap{width:100%;max-width:680px}
  .harp-body{background:linear-gradient(180deg,#1a1208,#2a1e0c);border:1px solid #ffffff18;border-radius:12px;padding:20px;position:relative}
  .harp-holes{display:flex;gap:6px;justify-content:center;margin-bottom:12px}
  .hole{width:36px;height:56px;background:var(--surface);border:1px solid #ffffff15;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--muted);transition:all .15s;cursor:pointer;flex-direction:column;gap:2px}
  .hole.active{background:var(--accent);border-color:var(--accent2);color:#fff;box-shadow:0 0 14px var(--glow)}
  .hole-num{font-size:.6rem;opacity:.5}
  .harp-indicator{text-align:center;font-size:.7rem;color:var(--muted);margin-top:8px}
  .hand-pos{width:60%;margin:10px auto 0;height:4px;background:var(--surface2);border-radius:4px;position:relative;overflow:visible}
  .hand-cursor{width:20px;height:20px;background:var(--accent);border-radius:50%;position:absolute;top:-8px;left:50%;transform:translateX(-50%);transition:left .1s;box-shadow:0 0 10px var(--glow)}
  /* note flash */
  .note-flash{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:2rem;font-weight:700;color:var(--accent2);pointer-events:none;opacity:0;transition:opacity .3s;text-shadow:0 0 20px var(--glow);z-index:99}
  .note-flash.show{opacity:1}
  #hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:.7rem;color:var(--muted);text-align:center;white-space:nowrap}
  #start-btn{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0fcc;gap:12px;z-index:10;cursor:pointer;border:none}
  #start-btn span{font-size:2rem}
  #start-btn p{color:var(--muted);font-size:.85rem}
  #start-btn button{background:var(--accent);color:#fff;border:none;padding:10px 28px;border-radius:24px;font-size:.9rem;cursor:pointer;box-shadow:0 0 16px var(--glow)}
</style>
</head>
<body>
<header>
  <div class="logo">🎵 GestureMusic</div>
  <div class="instruments">
    <button class="inst-btn active" onclick="setInstrument('piano')">🎹 Piano</button>
    <button class="inst-btn" onclick="setInstrument('guitar')">🎸 Guitar</button>
    <button class="inst-btn" onclick="setInstrument('drums')">🥁 Drums</button>
    <button class="inst-btn" onclick="setInstrument('harmonica')">🎵 Harmonica</button>
  </div>
  <div class="status"><div class="dot" id="cam-dot"></div><span id="cam-status">Camera off</span></div>
</header>
<main>
  <div id="cam-wrap">
    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <div id="start-btn">
      <span>📷</span>
      <p>Enable camera to start playing</p>
      <button onclick="startCamera()">Start Camera</button>
    </div>
  </div>
  <div class="instrument-panel" id="panel">
    <!-- injected by JS -->
  </div>
</main>
<div class="note-flash" id="note-flash"></div>

<script>
const AC = new (window.AudioContext||window.webkitAudioContext)();
let currentInstrument = 'piano';
let handData = null;
let cooldowns = {};
let camStarted = false;

// ── Audio helpers ──────────────────────────────────────────────
function noteFreq(note){
  const notes={C4:261.63,D4:293.66,E4:329.63,F4:349.23,G4:392,A4:440,B4:493.88,
    C5:523.25,D5:587.33,E5:659.25,F5:698.46,G5:783.99,A5:880,B5:987.77,
    'C#4':277.18,'D#4':311.13,'F#4':369.99,'G#4':415.3,'A#4':466.16,
    'C#5':554.37,'D#5':622.25,'F#5':739.99,'G#5':830.61,'A#5':932.33};
  return notes[note]||440;
}

function playTone(freq,type='sine',dur=0.4,vol=0.4,attack=0.01,decay=0.1){
  if(AC.state==='suspended') AC.resume();
  const o=AC.createOscillator(), g=AC.createGain();
  o.connect(g); g.connect(AC.destination);
  o.type=type; o.frequency.value=freq;
  const t=AC.currentTime;
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+attack);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t); o.stop(t+dur+0.05);
}

function playNote(name,freq,type='triangle',dur=0.5){
  playTone(freq,type,dur,0.45);
  showFlash(name);
}

function playDrum(type){
  if(AC.state==='suspended') AC.resume();
  if(type==='kick'){
    const o=AC.createOscillator(),g=AC.createGain();
    o.connect(g);g.connect(AC.destination);
    o.frequency.setValueAtTime(150,AC.currentTime);
    o.frequency.exponentialRampToValueAtTime(0.01,AC.currentTime+0.5);
    g.gain.setValueAtTime(1,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.5);
    o.start();o.stop(AC.currentTime+0.5);
  } else if(type==='snare'){
    const buf=AC.createBuffer(1,AC.sampleRate*0.2,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    s.buffer=buf;f.type='bandpass';f.frequency.value=3000;
    s.connect(f);f.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(0.8,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.2);
    s.start();
  } else if(type==='hihat'){
    const buf=AC.createBuffer(1,AC.sampleRate*0.05,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1);
    const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    s.buffer=buf;f.type='highpass';f.frequency.value=8000;
    s.connect(f);f.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(0.5,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.05);
    s.start();
  } else if(type==='crash'){
    const buf=AC.createBuffer(1,AC.sampleRate*0.8,AC.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(AC.sampleRate*0.4));
    const s=AC.createBufferSource(),g=AC.createGain(),f=AC.createBiquadFilter();
    s.buffer=buf;f.type='highpass';f.frequency.value=5000;
    s.connect(f);f.connect(g);g.connect(AC.destination);
    g.gain.setValueAtTime(0.7,AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.8);
    s.start();
  } else if(type==='tom1'){
    playTone(120,'sine',0.3,0.6);
  } else if(type==='tom2'){
    playTone(90,'sine',0.3,0.6);
  } else if(type==='ride'){
    playTone(3000,'square',0.4,0.1);
  } else if(type==='clap'){
    [0,0.01,0.02].forEach(d=>{
      const buf=AC.createBuffer(1,AC.sampleRate*0.05,AC.sampleRate);
      const dat=buf.getChannelData(0);
      for(let i=0;i<dat.length;i++) dat[i]=(Math.random()*2-1);
      const s=AC.createBufferSource(),g=AC.createGain();
      s.buffer=buf;s.connect(g);g.connect(AC.destination);
      g.gain.setValueAtTime(0.5,AC.currentTime+d);
      g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d+0.05);
      s.start(AC.currentTime+d);
    });
  }
}

function playChord(chord){
  const chords={
    'Em':[164.81,196,246.94,329.63],
    'Am':[110,130.81,164.81,220],
    'C':[130.81,164.81,196,261.63],
    'G':[98,123.47,146.83,196],
    'D':[146.83,185,220,293.66],
    'F':[87.31,110,130.81,174.61],
  };
  const freqs=chords[chord]||chords['Em'];
  freqs.forEach((f,i)=>{
    setTimeout(()=>playTone(f,'sawtooth',0.6,0.2),i*15);
  });
  showFlash(chord);
}

function showFlash(txt){
  const el=document.getElementById('note-flash');
  el.textContent=txt; el.classList.add('show');
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.classList.remove('show'),600);
}

// ── Instrument UIs ────────────────────────────────────────────
const pianoNotes=[
  {n:'C4',b:false},{n:'C#4',b:true},{n:'D4',b:false},{n:'D#4',b:true},
  {n:'E4',b:false},{n:'F4',b:false},{n:'F#4',b:true},{n:'G4',b:false},
  {n:'G#4',b:true},{n:'A4',b:false},{n:'A#4',b:true},{n:'B4',b:false},
  {n:'C5',b:false},{n:'C#5',b:true},{n:'D5',b:false},{n:'D#5',b:true},
  {n:'E5',b:false}
];
const whiteNotes=pianoNotes.filter(n=>!n.b);
const blackNotes=pianoNotes.filter(n=>n.b);

function buildPiano(){
  const wrap=document.createElement('div');wrap.id='piano-wrap';
  const keys=document.createElement('div');keys.className='piano-keys';
  const whites=whiteNotes.length;
  whiteNotes.forEach((n,i)=>{
    const k=document.createElement('div');
    k.className='wkey';k.id='k-'+n.n;k.title=n.n;
    k.onclick=()=>triggerNote(n.n);
    keys.appendChild(k);
  });
  // black keys positioned absolutely
  const blackPositions={'C#4':0,'D#4':1,'F#4':3,'G#4':4,'A#4':5,'C#5':7,'D#5':8};
  blackNotes.forEach(n=>{
    const pos=blackPositions[n.n];
    if(pos===undefined) return;
    const k=document.createElement('div');
    k.className='bkey';k.id='k-'+n.n;k.title=n.n;
    k.style.left=`calc(${(pos+1)*(100/whites) - (100/whites)*0.28}%)`;
    k.onclick=()=>triggerNote(n.n);
    keys.appendChild(k);
  });
  const lbl=document.createElement('div');lbl.className='piano-label';
  lbl.textContent='Move fingertips down onto the keys to play • White & black keys supported';
  wrap.appendChild(keys);wrap.appendChild(lbl);
  return wrap;
}

function buildGuitar(){
  const wrap=document.createElement('div');wrap.id='guitar-wrap';
  const neck=document.createElement('div');neck.className='guitar-neck';
  // strings
  [30,55,80,105,130].forEach(top=>{
    const s=document.createElement('div');s.className='string-line';s.style.top=top+'px';neck.appendChild(s);
  });
  // frets
  [15,25,37,50,63,75].forEach(pct=>{
    const f=document.createElement('div');f.className='fret-line';f.style.left=pct+'%';neck.appendChild(f);
  });
  const zones=document.createElement('div');zones.className='chord-zones';
  ['Em','Am','C','G','D','F'].forEach((c,i)=>{
    const z=document.createElement('div');z.className='chord-z';z.id='chord-'+c;z.dataset.chord=c;
    z.innerHTML=`<span>${c}</span>`;z.onclick=()=>triggerChord(c);
    zones.appendChild(z);
  });
  const strum=document.createElement('div');strum.className='strum-zone';strum.id='strum-zone';
  strum.innerHTML='<span>STRUM</span>';
  neck.appendChild(zones);neck.appendChild(strum);
  const lbl=document.createElement('div');lbl.style.cssText='text-align:center;margin-top:10px;font-size:.7rem;color:var(--muted)';
  lbl.textContent='Left hand selects chord zone • Right hand enters strum zone to play';
  wrap.appendChild(neck);wrap.appendChild(lbl);
  return wrap;
}

const drumPads=[
  {id:'kick',label:'Kick',icon:'🦵'},{id:'snare',label:'Snare',icon:'🥁'},
  {id:'hihat',label:'Hi-Hat',icon:'🎩'},{id:'crash',label:'Crash',icon:'💥'},
  {id:'tom1',label:'Tom 1',icon:'🔴'},{id:'tom2',label:'Tom 2',icon:'🟠'},
  {id:'ride',label:'Ride',icon:'⭕'},{id:'clap',label:'Clap',icon:'👏'},
];

function buildDrums(){
  const wrap=document.createElement('div');wrap.id='drums-wrap';
  drumPads.forEach(p=>{
    const pad=document.createElement('div');pad.className='pad';pad.id='pad-'+p.id;
    pad.innerHTML=`<span class="pad-icon">${p.icon}</span><span>${p.label}</span>`;
    pad.onclick=()=>triggerDrum(p.id);
    wrap.appendChild(pad);
  });
  return wrap;
}

const harpNotes=['C4','D4','E4','F4','G4','A4','B4','C5','D5','E5'];

function buildHarmonica(){
  const wrap=document.createElement('div');wrap.id='harmonica-wrap';
  const body=document.createElement('div');body.className='harp-body';
  const holes=document.createElement('div');holes.className='harp-holes';
  harpNotes.forEach((n,i)=>{
    const h=document.createElement('div');h.className='hole';h.id='hole-'+i;
    h.innerHTML=`<span>${n.replace('4','').replace('5','')}</span><span class="hole-num">${i+1}</span>`;
    h.onclick=()=>triggerNote(n);
    holes.appendChild(h);
  });
  const ind=document.createElement('div');ind.className='harp-indicator';
  ind.textContent='Move your hand left/right in front of the camera to play notes';
  const hpos=document.createElement('div');hpos.className='hand-pos';
  const cur=document.createElement('div');cur.className='hand-cursor';cur.id='harp-cursor';
  hpos.appendChild(cur);
  body.appendChild(holes);body.appendChild(ind);body.appendChild(hpos);
  wrap.appendChild(body);
  return wrap;
}

function setInstrument(name){
  currentInstrument=name;
  document.querySelectorAll('.inst-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.inst-btn[onclick*="${name}"]`).classList.add('active');
  const panel=document.getElementById('panel');
  panel.innerHTML='';
  if(name==='piano') panel.appendChild(buildPiano());
  else if(name==='guitar') panel.appendChild(buildGuitar());
  else if(name==='drums') panel.appendChild(buildDrums());
  else if(name==='harmonica') panel.appendChild(buildHarmonica());
  cooldowns={};
}

// ── Trigger helpers ───────────────────────────────────────────
function triggerNote(note,src='click'){
  if(cooldowns[note] && Date.now()-cooldowns[note]<300) return;
  cooldowns[note]=Date.now();
  playNote(note,noteFreq(note),'triangle',0.5);
  if(currentInstrument==='piano'){
    const el=document.getElementById('k-'+note);
    if(el){el.classList.add('active');setTimeout(()=>el.classList.remove('active'),250);}
  } else if(currentInstrument==='harmonica'){
    const idx=harpNotes.indexOf(note);
    if(idx>=0){
      const el=document.getElementById('hole-'+idx);
      if(el){el.classList.add('active');setTimeout(()=>el.classList.remove('active'),250);}
    }
  }
}

function triggerChord(chord){
  if(cooldowns['chord'] && Date.now()-cooldowns['chord']<500) return;
  cooldowns['chord']=Date.now();
  playChord(chord);
  const el=document.getElementById('chord-'+chord);
  if(el){el.classList.add('active');setTimeout(()=>el.classList.remove('active'),400);}
}

function triggerDrum(id){
  if(cooldowns[id] && Date.now()-cooldowns[id]<200) return;
  cooldowns[id]=Date.now();
  playDrum(id);
  showFlash(drumPads.find(p=>p.id===id)?.label||id);
  const el=document.getElementById('pad-'+id);
  if(el){el.classList.add('active');setTimeout(()=>el.classList.remove('active'),200);}
}

// ── Camera & MediaPipe ────────────────────────────────────────
let lastStrumY=null, strumCooldown=0;
let lastHarpX=null;

async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{width:480,height:360,facingMode:'user'}});
    const vid=document.getElementById('webcam');
    vid.srcObject=stream;
    await vid.play();
    document.getElementById('start-btn').style.display='none';
    document.getElementById('cam-dot').classList.add('on');
    document.getElementById('cam-status').textContent='Camera on';
    camStarted=true;
    initMediaPipe();
  } catch(e){
    alert('Camera access denied or unavailable.');
  }
}

function initMediaPipe(){
  const script=document.createElement('script');
  script.src='https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js';
  script.onload=()=>{
    const script2=document.createElement('script');
    script2.src='https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js';
    script2.onload=setupHands;
    document.head.appendChild(script2);
  };
  document.head.appendChild(script);
}

function setupHands(){
  const vid=document.getElementById('webcam');
  const canvas=document.getElementById('overlay');
  canvas.width=vid.videoWidth||480;
  canvas.height=vid.videoHeight||360;
  const ctx=canvas.getContext('2d');

  const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`});
  hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.7,minTrackingConfidence:0.5});
  hands.onResults(r=>onResults(r,ctx,canvas));

  const cam=new Camera(vid,{onFrame:async()=>{await hands.send({image:vid})},width:480,height:360});
  cam.start();
}

function onResults(results,ctx,canvas){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!results.multiHandLandmarks||results.multiHandLandmarks.length===0) return;

  results.multiHandLandmarks.forEach((lm,hi)=>{
    // draw skeleton
    drawSkeleton(ctx,lm,canvas.width,canvas.height);

    if(currentInstrument==='piano') handlePiano(lm,canvas);
    else if(currentInstrument==='guitar') handleGuitar(lm,canvas,hi,results.multiHandedness[hi]);
    else if(currentInstrument==='drums') handleDrums(lm,canvas);
    else if(currentInstrument==='harmonica') handleHarmonica(lm,canvas);
  });
}

function drawSkeleton(ctx,lm,w,h){
  const connections=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],[0,17]];
  ctx.strokeStyle='rgba(124,58,237,0.5)';ctx.lineWidth=1.5;
  connections.forEach(([a,b])=>{
    ctx.beginPath();
    ctx.moveTo((1-lm[a].x)*w,lm[a].y*h);
    ctx.lineTo((1-lm[b].x)*w,lm[b].y*h);
    ctx.stroke();
  });
  lm.forEach((p,i)=>{
    const tip=[4,8,12,16,20].includes(i);
    ctx.beginPath();
    ctx.arc((1-p.x)*w,p.y*h,tip?5:3,0,Math.PI*2);
    ctx.fillStyle=tip?'rgba(168,85,247,0.9)':'rgba(124,58,237,0.6)';
    ctx.fill();
  });
}

function handlePiano(lm,canvas){
  const tips=[4,8,12,16,20];
  const panelEl=document.querySelector('#piano-wrap .piano-keys');
  if(!panelEl) return;
  const panelRect=panelEl.getBoundingClientRect();
  const camRect=canvas.getBoundingClientRect();
  const totalW=panelRect.width;
  const whites=whiteNotes.length;

  tips.forEach(ti=>{
    const p=lm[ti];
    // map landmark x to piano panel
    const normX=1-p.x; // mirror
    const normY=p.y;
    const wristY=lm[0].y;
    const dip=normY - wristY;

    // map x to white key index
    const keyIdx=Math.floor(normX*whites);
    if(keyIdx<0||keyIdx>=whites) return;
    const note=whiteNotes[keyIdx].n;

    if(dip>0.12){
      triggerNote(note,'gesture');
    }
  });
}

function handleGuitar(lm,canvas,handIdx,handedness){
  const isRight=handedness?.label==='Right';
  const wristX=lm[0].x;
  const wristY=lm[0].y;
  const indexY=lm[8].y;

  if(isRight){
    // strum zone: right side of frame (x < 0.2 in mirrored)
    const mirrX=1-wristX;
    if(mirrX>0.75){
      const dy=Math.abs(indexY - (lastStrumY||indexY));
      if(dy>0.05 && Date.now()-strumCooldown>400){
        strumCooldown=Date.now();
        const strumEl=document.getElementById('strum-zone');
        if(strumEl){strumEl.classList.add('active');setTimeout(()=>strumEl.classList.remove('active'),300);}
        // find selected chord
        const sel=document.querySelector('.chord-z.active');
        triggerChord(sel?sel.dataset.chord:'Em');
      }
    }
    lastStrumY=indexY;
  } else {
    // left hand selects chord
    const chords=['Em','Am','C','G','D','F'];
    const mirrX=1-wristX;
    const idx=Math.min(5,Math.floor(mirrX*6));
    const chord=chords[idx];
    document.querySelectorAll('.chord-z').forEach(z=>z.classList.remove('active'));
    const el=document.getElementById('chord-'+chord);
    if(el) el.classList.add('active');
  }
}

function handleDrums(lm,canvas){
  const tips=[8,12,16,20,4]; // index,middle,ring,pinky,thumb
  const padIds=['kick','snare','hihat','crash','tom1','tom2','ride','clap'];
  // divide screen into 4x2 zones
  tips.forEach(ti=>{
    const p=lm[ti];
    const mx=1-p.x, my=p.y;
    const col=Math.min(3,Math.floor(mx*4));
    const row=Math.min(1,Math.floor(my*2));
    const padIdx=row*4+col;
    const padId=padIds[padIdx];
    // trigger if finger is in lower portion (y > 0.3) and moving down
    if(my>0.3 && padId){
      triggerDrum(padId);
    }
  });
}

function handleHarmonica(lm,canvas){
  const wristX=1-lm[0].x; // mirrored
  // map to hole index
  const holeIdx=Math.min(9,Math.floor(wristX*10));
  const cursor=document.getElementById('harp-cursor');
  if(cursor) cursor.style.left=(wristX*100)+'%';

  const note=harpNotes[holeIdx];
  if(note && (!lastHarpX || Math.abs(wristX-lastHarpX)>0.03)){
    triggerNote(note,'gesture');
  }
  lastHarpX=wristX;
}

// init
setInstrument('piano');
</script>
